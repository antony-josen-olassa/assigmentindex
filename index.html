<!DOCTYPE html>
<html>
<head>
    <title>Online Assignment System</title>

    <style>
        body {
            background: #0F172A;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .box {
            margin: 20px auto;
            padding: 20px;
            width: 380px;
            background: #1E293B;
            border-radius: 10px;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 90%;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #8B5CF6;
            color: white;
            padding: 8px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #7C3AED;
        }

        .delete-btn {
            background: #EF4444;
        }

        .list {
            text-align: left;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>Online Assignment System</h1>

<!-- Add User -->
<div class="box">
    <h2>Add User</h2>
    <input id="name" placeholder="Name"><br>
    <input id="email" placeholder="Email"><br>
    <button onclick="addUser()">Add User</button>
</div>

<!-- Add Assignment -->
<div class="box">
    <h2>Add Assignment</h2>
    <input id="title" placeholder="Title"><br>
    <input id="marks" placeholder="Marks"><br>
    <button onclick="addAssignment()">Add Assignment</button>
</div>

<!-- Submit Assignment -->
<div class="box">
    <h2>Submit Assignment</h2>
    <input id="user_id" placeholder="User ID"><br>
    <input id="assignment_id" placeholder="Assignment ID"><br>
    <input id="marks_obtained" placeholder="Marks"><br>
    <button onclick="submitAssignment()">Submit</button>
</div>

<!-- View Users -->
<div class="box">
    <h2>View Users</h2>
    <button onclick="getUsers()">Load Users</button>
    <div id="usersList" class="list"></div>
</div>

<!-- View Assignments -->
<div class="box">
    <h2>View Assignments</h2>
    <button onclick="getAssignments()">Load Assignments</button>
    <div id="assignmentList" class="list"></div>
</div>

<!-- View Marks -->
<div class="box">
    <h2>Marks Dashboard</h2>
    <button onclick="getSubmissions()">Load Marks</button>
    <div id="marksList" class="list"></div>
</div>

<script>
const url = "https://duxdysjrjrztlsqbjdjj.supabase.co";
const key = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1eGR5c2pyanJ6dGxzcWJqZGpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjkwMDMsImV4cCI6MjA4OTk0NTAwM30.Ct43H9QXlAGqqxzhu_2M1cQEX_m1fAZ_AQYV2uS-ag4"; 

// ADD USER
async function addUser() {
    await fetch(url + "/rest/v1/users", {
        method: "POST",
        headers: {
            "apikey": key,
            "Authorization": "Bearer " + key,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            role: "Student"
        })
    });
    alert("User Added");
}

// DELETE USER
async function deleteUser(id) {
    if (!confirm("Delete this user?")) return;

    await fetch(url + `/rest/v1/users?id=eq.${id}`, {
        method: "DELETE",
        headers: {
            "apikey": key,
            "Authorization": "Bearer " + key
        }
    });

    alert("User Deleted");
    getUsers();
}

// VIEW USERS
async function getUsers() {
    const res = await fetch(url + "/rest/v1/users", {
        headers: {
            "apikey": key,
            "Authorization": "Bearer " + key
        }
    });

    const data = await res.json();
    let output = "";

    data.forEach(user => {
        output += `
        <p>
        ID: ${user.id} | ${user.name} (${user.email})
        <button class="delete-btn" onclick="deleteUser(${user.id})">Delete</button>
        </p>`;
    });

    document.getElementById("usersList").innerHTML = output;
}

// ADD ASSIGNMENT
async function addAssignment() {
    await fetch(url + "/rest/v1/assignments", {
        method: "POST",
        headers: {
            "apikey": key,
            "Authorization": "Bearer " + key,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            title: document.getElementById("title").value,
            max_marks: document.getElementById("marks").value
        })
    });
    alert("Assignment Added");
}

// DELETE ASSIGNMENT
async function deleteAssignment(id) {
    if (!confirm("Delete this assignment?")) return;

    await fetch(url + `/rest/v1/assignments?id=eq.${id}`, {
        method: "DELETE",
        headers: {
            "apikey": key,
            "Authorization": "Bearer " + key
        }
    });

    alert("Assignment Deleted");
    getAssignments();
}

// VIEW ASSIGNMENTS
async function getAssignments() {
    const res = await fetch(url + "/rest/v1/assignments", {
        headers: {
            "apikey": key,
            "Authorization": "Bearer " + key
        }
    });

    const data = await res.json();
    let output = "";

    data.forEach(a => {
        output += `
        <p>
        ID: ${a.id} | ${a.title} (Max: ${a.max_marks})
        <button class="delete-btn" onclick="deleteAssignment(${a.id})">Delete</button>
        </p>`;
    });

    document.getElementById("assignmentList").innerHTML = output;
}

// SUBMIT ASSIGNMENT
async function submitAssignment() {
    await fetch(url + "/rest/v1/submissions", {
        method: "POST",
        headers: {
            "apikey": key,
            "Authorization": "Bearer " + key,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            user_id: document.getElementById("user_id").value,
            assignment_id: document.getElementById("assignment_id").value,
            marks_obtained: document.getElementById("marks_obtained").value,
            status: "submitted"
        })
    });
    alert("Submitted");
}

// VIEW MARKS
async function getSubmissions() {
    const res = await fetch(url + "/rest/v1/submissions", {
        headers: {
            "apikey": key,
            "Authorization": "Bearer " + key
        }
    });

    const data = await res.json();
    let output = "";

    data.forEach(s => {
        output += `<p>User: ${s.user_id} | Assignment: ${s.assignment_id} | Marks: ${s.marks_obtained}</p>`;
    });

    document.getElementById("marksList").innerHTML = output;
}
</script>

</body>
</html>
